spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/projeto_base}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
      org:
        hibernate:
          envers:
            audit_table_suffix: _AUD
            revision_field_name: REV
            revision_type_field_name: REVTYPE
  jackson:
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:cHJvamV0by1iYXNlLXNlY3JldC1rZXktZGV2ZS1zZXItYWx0ZXJhZGEtZW0tcHJvZHVjYW8tMjU2}
  expiration: 86400000

server:
  port: 8080
